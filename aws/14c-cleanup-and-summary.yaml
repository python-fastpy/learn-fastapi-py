#   │ ACM Certificate           │ AWS::CertificateManager::Certificate     │
#   ├───────────────────────────┼──────────────────────────────────────────┤
#   │ Secrets Manager Secret    │ AWS::SecretsManager::Secret              │
#   │ Secrets Rotation          │ AWS::SecretsManager::RotationSchedule    │
#   │ Secrets Resource Policy   │ AWS::SecretsManager::ResourcePolicy      │
