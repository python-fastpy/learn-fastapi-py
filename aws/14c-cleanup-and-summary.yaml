# ══════════════════════════════════════════════════════════════════
# CloudFormation — Cleanup & Summary (Step 14)
# ══════════════════════════════════════════════════════════════════
# Navigation:  Python lesson: 14-cleanup-and-summary.py
#
# THIS IS NOT A DEPLOYABLE PRODUCTION TEMPLATE.
# It is an educational reference that demonstrates:
#   - How to delete stacks in the correct dependency order
#   - Custom resources (Lambda-backed) for pre-deletion cleanup
#   - DeletionPolicy / UpdateReplacePolicy on resources
#   - Stack termination protection
#   - Change sets, drift detection, and nested stacks
#
# ── Deleting Stacks in the Correct Order ────────────────────────
#
# When you have multiple stacks that depend on each other, you must
# delete them in REVERSE order of creation. If Stack B imports a
# value from Stack A, you cannot delete Stack A first.
#
#   DELETE ORDER (reverse of creation):
#
#     1. WAF stack          (depends on ALB stack)
#     2. CloudFront stack   (depends on ALB, S3)
#     3. Route 53 stack     (depends on CloudFront, ALB)
#     4. ECS stack          (depends on ALB, ECR, Secrets, VPC)
#     5. ALB stack          (depends on VPC)
#     6. CloudWatch stack   (depends on SNS, ECS, Lambda)
#     7. SNS + SQS stacks   (standalone or linked)
#     8. Lambda stack       (depends on S3, Secrets)
#     9. API Gateway stack  (depends on Lambda)
#    10. Secrets stack      (standalone)
#    11. DynamoDB stack     (standalone)
#    12. ECR stack          (standalone — images inside get deleted)
#    13. S3 stack           (REQUIRES emptying bucket first!)
#    14. VPC stack          (delete last — everything depends on it)
#
#   IMPORTANT: S3 buckets that contain objects CANNOT be deleted by
#   CloudFormation. You must empty the bucket first. The custom
#   resource below automates this.
#
#   Delete command:
#     aws cloudformation delete-stack --stack-name book-store-waf-dev
#     aws cloudformation wait stack-delete-complete --stack-name book-store-waf-dev
#     # ... repeat for each stack in order
#
# ── Stack Termination Protection ────────────────────────────────
#
# Prevents accidental deletion of critical stacks (e.g., production).
# When enabled, delete-stack fails until you explicitly disable it.
#
#   Enable (for production stacks):
#     aws cloudformation update-termination-protection \
#       --enable-termination-protection \
#       --stack-name book-store-vpc-prod
#
#   Disable (when you intentionally want to delete):
#     aws cloudformation update-termination-protection \
#       --no-enable-termination-protection \
#       --stack-name book-store-vpc-prod
#
#   You can also set it at creation time:
#     aws cloudformation create-stack \
#       --stack-name book-store-vpc-prod \
#       --template-body file://02c-vpc.yaml \
#       --enable-termination-protection
#
# ── Change Sets ─────────────────────────────────────────────────
#
# A change set is a PREVIEW of what will happen when you update a
# stack. It shows which resources will be added, modified, or deleted
# BEFORE you apply the change. Like a "dry run" for infrastructure.
#
#   Create a change set (preview):
#     aws cloudformation create-change-set \
#       --stack-name book-store-ecs-dev \
#       --template-body file://08c-ecs-fargate.yaml \
#       --change-set-name update-task-count \
#       --parameters ParameterKey=DesiredCount,ParameterValue=3
#
#   Review the change set:
#     aws cloudformation describe-change-set \
#       --stack-name book-store-ecs-dev \
#       --change-set-name update-task-count
#
#   Execute (apply the change):
#     aws cloudformation execute-change-set \
#       --stack-name book-store-ecs-dev \
#       --change-set-name update-task-count
#
#   Delete (cancel without applying):
#     aws cloudformation delete-change-set \
#       --stack-name book-store-ecs-dev \
#       --change-set-name update-task-count
#
#   Change types in the output:
#     Add       → new resource will be created
#     Modify    → existing resource will be updated
#     Remove    → resource will be deleted
#     Replacement: True  → resource will be REPLACED (deleted + recreated)
#     Replacement: False → in-place update (no downtime)
#
# ── Stack Drift Detection ──────────────────────────────────────
#
# Drift occurs when someone manually changes a resource that is
# managed by CloudFormation (e.g., editing a security group in the
# console). Drift detection identifies these discrepancies.
#
#   Detect drift:
#     aws cloudformation detect-stack-drift \
#       --stack-name book-store-vpc-dev
#
#   Check drift status:
#     aws cloudformation describe-stack-drift-detection-status \
#       --stack-drift-detection-id <id-from-above>
#
#   View drifted resources:
#     aws cloudformation describe-stack-resource-drifts \
#       --stack-name book-store-vpc-dev \
#       --stack-resource-drift-status-filters MODIFIED DELETED
#
#   Drift statuses:
#     IN_SYNC   → resource matches the template (good)
#     MODIFIED  → resource was changed outside CloudFormation
#     DELETED   → resource was deleted outside CloudFormation
#     NOT_CHECKED → drift detection hasn't been run
#
#   After finding drift, you have two options:
#     1. Update the template to match reality (import the drift)
#     2. Update the stack to reset the resource (overwrite the drift)
#
# ── Nested Stacks vs Cross-Stack References ─────────────────────
#
# Two ways to organize multi-stack architectures:
#
#   ┌────────────────────────────┬────────────────────────────────┐
#   │ Nested Stacks              │ Cross-Stack References         │
#   ├────────────────────────────┼────────────────────────────────┤
#   │ Parent stack creates child │ Independent stacks that share  │
#   │ stacks as resources        │ values via Exports/Imports     │
#   │                            │                                │
#   │ Type: AWS::CloudFormation::│ Producer: Outputs + Export     │
#   │   Stack                    │ Consumer: !ImportValue         │
#   │                            │                                │
#   │ Parent controls lifecycle  │ Each stack has own lifecycle   │
#   │ of ALL children            │ Delete order matters           │
#   │                            │                                │
#   │ Good for: tightly coupled  │ Good for: loosely coupled     │
#   │ resources deployed together│ resources, team ownership      │
#   │                            │                                │
#   │ Template stored in S3      │ No S3 needed                  │
#   │                            │                                │
#   │ Example:                   │ Example:                      │
#   │   Parent: infrastructure   │   VPC stack exports SubnetIds │
#   │     Child: VPC             │   ECS stack imports SubnetIds │
#   │     Child: ECS             │                                │
#   │     Child: ALB             │                                │
#   └────────────────────────────┴────────────────────────────────┘
#
# ══════════════════════════════════════════════════════════════════
# SUMMARY TABLE: Service → CloudFormation Resource Type
# ══════════════════════════════════════════════════════════════════
#
#   ┌───────────────────────────┬──────────────────────────────────────────┐
#   │ AWS Service               │ CloudFormation Resource Type              │
#   ├───────────────────────────┼──────────────────────────────────────────┤
#   │ VPC                       │ AWS::EC2::VPC                            │
#   │ Subnet                    │ AWS::EC2::Subnet                         │
#   │ Internet Gateway          │ AWS::EC2::InternetGateway                │
#   │ NAT Gateway               │ AWS::EC2::NatGateway                     │
#   │ Security Group            │ AWS::EC2::SecurityGroup                  │
#   │ Route Table               │ AWS::EC2::RouteTable                     │
#   ├───────────────────────────┼──────────────────────────────────────────┤
#   │ S3 Bucket                 │ AWS::S3::Bucket                          │
#   │ S3 Bucket Policy          │ AWS::S3::BucketPolicy                    │
#   ├───────────────────────────┼──────────────────────────────────────────┤
#   │ EC2 Instance              │ AWS::EC2::Instance                       │
#   │ EC2 Key Pair              │ AWS::EC2::KeyPair                        │
#   ├───────────────────────────┼──────────────────────────────────────────┤
#   │ Lambda Function           │ AWS::Lambda::Function                    │
#   │ Lambda Permission         │ AWS::Lambda::Permission                  │
#   │ Lambda Event Source Map   │ AWS::Lambda::EventSourceMapping          │
#   ├───────────────────────────┼──────────────────────────────────────────┤
#   │ API Gateway (REST)        │ AWS::ApiGateway::RestApi                 │
#   │ API Gateway (HTTP)        │ AWS::ApiGatewayV2::Api                   │
#   ├───────────────────────────┼──────────────────────────────────────────┤
#   │ ECR Repository            │ AWS::ECR::Repository                     │
#   ├───────────────────────────┼──────────────────────────────────────────┤
#   │ ECS Cluster               │ AWS::ECS::Cluster                        │
#   │ ECS Service               │ AWS::ECS::Service                        │
#   │ ECS Task Definition       │ AWS::ECS::TaskDefinition                 │
#   ├───────────────────────────┼──────────────────────────────────────────┤
#   │ ALB                       │ AWS::ElasticLoadBalancingV2::LoadBalancer │
#   │ ALB Target Group          │ AWS::ElasticLoadBalancingV2::TargetGroup  │
#   │ ALB Listener              │ AWS::ElasticLoadBalancingV2::Listener     │
#   │ ALB Listener Rule         │ AWS::ElasticLoadBalancingV2::ListenerRule │
#   ├───────────────────────────┼──────────────────────────────────────────┤
#   │ CloudWatch Log Group      │ AWS::Logs::LogGroup                      │
#   │ CloudWatch Alarm          │ AWS::CloudWatch::Alarm                   │
#   │ CloudWatch Dashboard      │ AWS::CloudWatch::Dashboard               │
