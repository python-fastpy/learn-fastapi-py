#   │ DynamoDB Table            │ AWS::DynamoDB::Table                     │
#   ├───────────────────────────┼──────────────────────────────────────────┤
#   │ SNS Topic                 │ AWS::SNS::Topic                          │
#   │ SNS Subscription          │ AWS::SNS::Subscription                   │
#   │ SNS Topic Policy          │ AWS::SNS::TopicPolicy                    │
