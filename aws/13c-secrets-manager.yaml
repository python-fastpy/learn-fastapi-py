# ══════════════════════════════════════════════════════════════════
# CloudFormation — Secrets Manager (Step 13)
# ══════════════════════════════════════════════════════════════════
# Navigation:  Python lesson: 13-secrets-manager.py
#
# This template creates AWS Secrets Manager resources:
#   - A secret with JSON key-value pairs (DB credentials)
#   - A secret with an auto-generated password
#   - A rotation schedule (placeholder Lambda ARN)
#   - A resource policy restricting access to specific IAM roles
#
# Deploy:
#   aws cloudformation create-stack \
#     --stack-name book-store-secrets-dev \
#     --template-body file://13c-secrets-manager.yaml \
#     --parameters ParameterKey=Environment,ParameterValue=dev \
#                  ParameterKey=SecretNamePrefix,ParameterValue=/book-store/dev/
#
# ── Secrets Manager vs SSM Parameter Store ──────────────────────
#
#   ┌──────────────────────────┬─────────────────────────────────┐
#   │ Secrets Manager          │ SSM Parameter Store             │
#   ├──────────────────────────┼─────────────────────────────────┤
#   │ $0.40 / secret / month   │ Standard: free                  │
#   │ $0.05 / 10,000 API calls │ Advanced: $0.05 / param / month │
#   │ Automatic rotation       │ No built-in rotation            │
#   │ Cross-account sharing    │ Same-account only               │
#   │ Auto-generated passwords │ No generation                   │
#   │ JSON structure support   │ String / StringList only        │
#   │ Resource policies        │ No resource policies            │
#   └──────────────────────────┴─────────────────────────────────┘
#
#   Rule of thumb:
#     - Passwords, API keys, DB creds → Secrets Manager
#     - Config values, feature flags  → SSM Parameter Store
#
# ── Version Stages ──────────────────────────────────────────────
#
#   Every secret update creates a new VERSION (UUID-identified).
#   Staging labels track which version is active:
#
#     AWSCURRENT   → the active version (GetSecretValue returns this)
#     AWSPREVIOUS  → the version before the last update (rollback)
#     AWSPENDING   → mid-rotation; the new value being tested
#
#   During rotation:
#     1. createSecret  → new password stored with label AWSPENDING
#     2. setSecret     → database updated with the AWSPENDING password
#     3. testSecret    → verify the AWSPENDING password works
#     4. finishSecret  → AWSPENDING becomes AWSCURRENT
#
# ── Dynamic References in Other Templates ───────────────────────
#
#   You can reference a secret VALUE directly in other CloudFormation
#   templates using dynamic references. The value is resolved at
#   deploy time — it never appears in the template or change set.
#
#   Syntax:
#     {{resolve:secretsmanager:<secret-id>:<secret-string>:<json-key>:<version-stage>:<version-id>}}
#
#   Examples:
#     # Get the full JSON string of a secret
#     {{resolve:secretsmanager:book-store/dev/db-credentials}}
#
#     # Get a specific JSON key from a secret
#     {{resolve:secretsmanager:book-store/dev/db-credentials:SecretString:password}}
#
#     # Get a specific version stage
#     {{resolve:secretsmanager:book-store/dev/db-credentials:SecretString:password:AWSCURRENT}}
#
#   Use case — RDS instance referencing a secret for its master password:
#     MasterUsername: '{{resolve:secretsmanager:my-db-secret:SecretString:username}}'
#     MasterUserPassword: '{{resolve:secretsmanager:my-db-secret:SecretString:password}}'
#
#   IMPORTANT: Dynamic references are resolved at deploy time.
#   If the secret value changes later, the resource is NOT updated
#   automatically — you need to update the stack.
#
# ══════════════════════════════════════════════════════════════════

AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Secrets Manager — JSON secrets, auto-generated passwords, rotation,
  and resource policies for the Book Store API (Step 13).

# ══════════════════════════════════════════════════════════════════
# PARAMETERS
# ══════════════════════════════════════════════════════════════════
# Parameters make the template reusable across environments.
# Pass different values for dev/qa/uat/prod without editing YAML.

Parameters:

  # ── Secret Name Prefix ─────────────────────────────────────────
  # Naming convention: /<project>/<environment>/
  # Examples: /book-store/dev/, /book-store/prod/
  # The prefix groups related secrets in the console and makes
  # IAM policies easier (allow /book-store/dev/* for dev team).
  SecretNamePrefix:
    Type: String
    Default: '/book-store/dev/'
    Description: >-
      Prefix for secret names (e.g., /book-store/dev/).
      Use slashes for hierarchical organization in the console.
    AllowedPattern: '^\/[a-zA-Z0-9\-]+\/[a-zA-Z0-9\-]+\/$'
    ConstraintDescription: >-
      Must follow the pattern /project/environment/ with leading
      and trailing slashes.

  # ── Environment Tag ────────────────────────────────────────────
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - qa
      - uat
      - prod
    Description: Deployment environment for tagging and naming.

  # ── Allowed IAM Role ARN ───────────────────────────────────────
  # The IAM role that is allowed to read this secret.
  # Typically the ECS Task Role or Lambda execution role.
  AllowedRoleArn:
    Type: String
    Default: 'arn:aws:iam::123456789012:role/book-store-ecs-task-role'
    Description: >-
      ARN of the IAM role allowed to read these secrets.
      Usually the ECS Task Role or Lambda execution role.

  # ── Rotation Lambda ARN ────────────────────────────────────────
  # The Lambda function that handles secret rotation.
  # AWS provides templates for RDS rotation; for custom secrets
  # (API keys, OAuth tokens), you write your own Lambda.
  RotationLambdaArn:
    Type: String
    Default: 'arn:aws:lambda:eu-west-1:123456789012:function:rotate-db-password'
    Description: >-
      ARN of the Lambda function that rotates the secret.
      For RDS, use AWS-provided Serverless Application Repository templates.
      For custom secrets, deploy your own rotation Lambda.

# ══════════════════════════════════════════════════════════════════
# RESOURCES
# ══════════════════════════════════════════════════════════════════

Resources:

  # ────────────────────────────────────────────────────────────────
  # 1. SECRET WITH JSON STRUCTURE (manual key-value pairs)
  # ────────────────────────────────────────────────────────────────
  #
  # This secret stores multiple credentials as a JSON object.
  # Each key-value pair is a separate credential.
  #
  # JSON structure stored in the secret:
  #   {
  #     "host": "bookstore-db.cluster-abc123.eu-west-1.rds.amazonaws.com",
  #     "port": "5432",
  #     "dbname": "bookstore",
  #     "username": "admin",
  #     "password": "CHANGE_ME_AFTER_DEPLOY"
  #   }
  #
  # WHY JSON? Because you often need multiple related values together.
  # A database connection requires host + port + user + password.
  # Storing them in one secret keeps them atomic — they rotate together.
  #
  # RETRIEVING in code:
  #   import boto3, json
  #   client = boto3.client("secretsmanager")
  #   raw = client.get_secret_value(SecretId="/book-store/dev/db-credentials")
  #   creds = json.loads(raw["SecretString"])
  #   host = creds["host"]         # bookstore-db.cluster-abc123...
  #   password = creds["password"] # the actual password
  #
  # IN ECS Task Definition (inject individual keys as env vars):
  #   Name:      DB_PASSWORD
  #   ValueFrom: arn:aws:secretsmanager:eu-west-1:123456789012:
  #              secret:/book-store/dev/db-credentials:password::
  #
  #   The format is: <secret-arn>:<json-key>:<version-stage>:<version-id>
  #   The trailing :: means "latest AWSCURRENT version".

  DatabaseCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      # Name uses the prefix parameter for environment isolation.
      # /book-store/dev/db-credentials vs /book-store/prod/db-credentials
      Name: !Sub '${SecretNamePrefix}db-credentials'

      # Description appears in the AWS console — helps team members
      # understand what this secret is for without clicking into it.
      Description: >-
        Database credentials for the Book Store API.
        Contains host, port, dbname, username, and password as JSON.

      # SecretString holds the actual secret value.
      # For JSON secrets, pass a JSON-formatted string.
      # IMPORTANT: This is the INITIAL value. After deployment,
      # update the password via the console or CLI — never store
      # real passwords in CloudFormation templates checked into git!
      SecretString: !Sub |
        {
          "host": "bookstore-db.cluster-abc123.eu-west-1.rds.amazonaws.com",
          "port": "5432",
          "dbname": "bookstore",
          "username": "admin",
          "password": "CHANGE_ME_AFTER_DEPLOY"
        }

      # KmsKeyId: Optional. By default, Secrets Manager uses the
      # AWS-managed key (aws/secretsmanager) which is free.
      # Specify a custom KMS key for cross-account access or
      # tighter access control.
      # KmsKeyId: !Ref MyCustomKmsKey

      Tags:
        - Key: Project
          Value: book-store
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # ────────────────────────────────────────────────────────────────
  # 2. SECRET WITH AUTO-GENERATED PASSWORD
  # ────────────────────────────────────────────────────────────────
  #
  # GenerateSecretString tells Secrets Manager to create a random
  # password automatically. This is the PREFERRED approach for
  # database passwords — you never see or type the password.
  #
  # The generated JSON will look like:
  #   {
  #     "username": "admin",
  #     "password": "aB3$xK9!mP2@nQ7&"   ← auto-generated
  #   }
  #
  # WHY auto-generate?
  #   - Humans pick weak passwords. Secrets Manager picks strong ones.
  #   - The password never appears in code, logs, or CloudFormation.
  #   - Combined with rotation, the password changes every 30 days
  #     without any human intervention.
  #
  # REFERENCING in other templates (e.g., an RDS instance):
  #   MasterUserPassword: !Sub
  #     '{{resolve:secretsmanager:${AutoGeneratedSecret}:SecretString:password}}'

  AutoGeneratedSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${SecretNamePrefix}auto-db-password'
      Description: >-
        Auto-generated database password for the Book Store API.
        Password is randomly generated by Secrets Manager — never
        hardcoded or visible in the template.

      # GenerateSecretString creates the secret value automatically.
      # You define the structure; Secrets Manager fills in the password.
      GenerateSecretString:
        # SecretStringTemplate: the JSON structure with KNOWN values.
        # The generated password will be inserted into this template.
        SecretStringTemplate: '{"username": "admin"}'

        # GenerateStringKey: which JSON key gets the auto-generated value.
        # Result: {"username": "admin", "password": "<random-string>"}
        GenerateStringKey: 'password'

        # PasswordLength: length of the generated password (default: 32).
        PasswordLength: 32

        # ExcludeCharacters: characters NOT allowed in the password.
        # Useful because some databases choke on certain special chars.
        # Common exclusions: quotes, backslashes, @, spaces.
        ExcludeCharacters: '"@/\'

        # ExcludePunctuation: if true, no special characters at all.
        # Default: false (punctuation is included for stronger passwords).
        # ExcludePunctuation: false

        # ExcludeUppercase / ExcludeLowercase / ExcludeNumbers:
        # Fine-grained control over character classes.
        # ExcludeUppercase: false
        # ExcludeLowercase: false
        # ExcludeNumbers: false

        # IncludeSpace: whether to allow spaces (default: false).
        # Almost always leave this false.
        # IncludeSpace: false

        # RequireEachIncludedType: require at least one character from
        # each included type (upper, lower, number, special).
        # Default: true — ensures password complexity.
        # RequireEachIncludedType: true

      Tags:
        - Key: Project
          Value: book-store
        - Key: Environment
          Value: !Ref Environment

  # ────────────────────────────────────────────────────────────────
  # 3. SECRET ROTATION SCHEDULE
  # ────────────────────────────────────────────────────────────────
  #
  # Automatic rotation changes the secret value on a schedule.
  # A Lambda function handles the actual rotation logic:
  #   1. Generate new password
  #   2. Update the database with the new password
  #   3. Test the new password works
  #   4. Promote AWSPENDING → AWSCURRENT
  #
  # Rotation flow in detail:
  #
  #   ┌────────────────┐         ┌────────────────┐
  #   │ Secrets Manager│         │ Rotation Lambda │
  #   │  (scheduler)   │────────►│  (your code)    │
  #   └────────────────┘         └───────┬────────┘
  #                                      │
  #       Step 1: createSecret           │ Generate new password,
  #               (AWSPENDING)           │ store as AWSPENDING
  #                                      │
  #       Step 2: setSecret              │ Update RDS/service
  #               (apply to DB)          │ with new password
  #                                      │
  #       Step 3: testSecret             │ Verify connection
  #               (validate)             │ with AWSPENDING password
  #                                      │
  #       Step 4: finishSecret           │ Move AWSPENDING → AWSCURRENT
  #               (promote)              │ Old value → AWSPREVIOUS
  #                                      ▼
  #
  # For RDS secrets, AWS provides pre-built rotation Lambdas via the
  # Serverless Application Repository. For custom secrets (API keys,
  # OAuth tokens), you write the Lambda yourself.

  DatabaseSecretRotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    Properties:
      # SecretId: which secret to rotate.
      # Can be a secret ARN, name, or !Ref to a secret resource.
      SecretId: !Ref AutoGeneratedSecret

      # RotationLambdaARN: the Lambda that performs the rotation.
      # This Lambda must have permission to:
      #   - Read/write the secret (secretsmanager:GetSecretValue, PutSecretValue)
      #   - Update the target service (e.g., rds:ModifyDBInstance)
      RotationLambdaARN: !Ref RotationLambdaArn

      # RotationRules: how often to rotate.
      RotationRules:
        # AutomaticallyAfterDays: rotate every N days.
        # 30 days is a common choice for database passwords.
        # For high-security environments, consider 7 or 14 days.
        AutomaticallyAfterDays: 30

    # DependsOn ensures the secret exists before creating the schedule.
    DependsOn: AutoGeneratedSecret

  # ────────────────────────────────────────────────────────────────
  # 4. RESOURCE POLICY (restrict who can access the secret)
  # ────────────────────────────────────────────────────────────────
  #
  # A resource policy is attached directly to the secret (like an
  # S3 bucket policy). It controls WHO can access the secret,
  # independent of the caller's IAM policy.
  #
  # TWO layers of access control:
  #   1. IAM Policy (on the role/user) — "I am allowed to read secrets"
  #   2. Resource Policy (on the secret) — "This secret allows these roles"
  #
  # BOTH must allow the action for it to succeed.
  # This is defense-in-depth: even if someone has broad IAM permissions,
  # the resource policy restricts which secrets they can actually read.
  #
  # Common use cases:
  #   - Restrict a secret to specific ECS Task Roles
  #   - Allow cross-account access (another AWS account's role)
  #   - Deny access from specific principals (explicit deny)

  DatabaseSecretResourcePolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      # SecretId: which secret to attach the policy to.
      SecretId: !Ref DatabaseCredentialsSecret

      # ResourcePolicy: a standard IAM policy document.
      ResourcePolicy:
        Version: '2012-10-17'
        Statement:
          # Statement 1: Allow a specific IAM role to read the secret.
          # This is the ECS Task Role (or Lambda execution role).
          - Sid: AllowTaskRoleAccess
            Effect: Allow
            Principal:
              AWS: !Ref AllowedRoleArn
            Action:
              - 'secretsmanager:GetSecretValue'
              - 'secretsmanager:DescribeSecret'
            Resource: '*'
            # Resource: '*' here means "this secret" — resource policies
            # are attached to the secret, so '*' refers to the secret itself.

          # Statement 2: Deny all principals EXCEPT the allowed role.
          # This is a restrictive pattern — only the specified role can
          # read the secret, even if other roles have broad IAM policies.
          - Sid: DenyAllExceptTaskRole
            Effect: Deny
            Principal: '*'
            Action:
              - 'secretsmanager:GetSecretValue'
            Resource: '*'
            Condition:
              StringNotEquals:
                # aws:PrincipalArn checks the ARN of the calling principal.
                # If the caller is NOT the allowed role, access is denied.
                'aws:PrincipalArn': !Ref AllowedRoleArn

# ══════════════════════════════════════════════════════════════════
# OUTPUTS
# ══════════════════════════════════════════════════════════════════
# Outputs export values for use by other stacks or for display.
# Use !ImportValue in other templates to reference these.

Outputs:

  # ── Database Credentials Secret ARN ────────────────────────────
  # The ARN is needed by ECS Task Definitions to inject secrets
  # as environment variables, and by IAM policies to grant access.
  DatabaseCredentialsSecretArn:
    Description: >-
      ARN of the database credentials secret.
      Use in ECS Task Definitions:
        ValueFrom: <this-arn>:password::
    Value: !Ref DatabaseCredentialsSecret
    # !Ref on a Secret returns the ARN (not the name).
    # This is different from most resources where !Ref returns an ID.
    Export:
      Name: !Sub '${Environment}-DatabaseCredentialsSecretArn'

  # ── Database Credentials Secret Name ───────────────────────────
  # The name is more human-readable and useful for boto3 calls:
  #   client.get_secret_value(SecretId="/book-store/dev/db-credentials")
  DatabaseCredentialsSecretName:
    Description: >-
      Name of the database credentials secret.
      Use with boto3: get_secret_value(SecretId="<this-name>")
    Value: !Sub '${SecretNamePrefix}db-credentials'
    Export:
      Name: !Sub '${Environment}-DatabaseCredentialsSecretName'

  # ── Auto-Generated Secret ARN ──────────────────────────────────
  AutoGeneratedSecretArn:
    Description: >-
      ARN of the auto-generated password secret.
      Reference in RDS templates:
        {{resolve:secretsmanager:<this-arn>:SecretString:password}}
    Value: !Ref AutoGeneratedSecret
    Export:
      Name: !Sub '${Environment}-AutoGeneratedSecretArn'

  # ── Auto-Generated Secret Name ─────────────────────────────────
  AutoGeneratedSecretName:
    Description: Name of the auto-generated password secret.
    Value: !Sub '${SecretNamePrefix}auto-db-password'
    Export:
      Name: !Sub '${Environment}-AutoGeneratedSecretName'
