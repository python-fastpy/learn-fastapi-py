#   04c-ec2.yaml                — EC2 instance, security group, user data
#   05c-lambda.yaml             — Lambda function, IAM role, log group
#   06c-api-gateway.yaml        — REST API, Lambda proxy, CORS, API key
#
#   (Future CloudFormation templates — matching remaining .py files)
#   07c-ecr.yaml                — ECR repository, lifecycle policy
#   08c-ecs-fargate.yaml        — ECS cluster, task def, service
#   09c-alb.yaml                — ALB, target group, listener rules
#   10c-cloudwatch.yaml         — Log groups, metric filters, alarms
#   11c-route53-cloudfront-acm.yaml — DNS, CDN, SSL certificates
#   12c-cloudfront-deep-dive.yaml   — Origins, behaviors, caching
#   13c-secrets-manager.yaml    — Secrets, rotation config
#   14c-cleanup.yaml            — (no template — cleanup is manual)
#   15c-dynamodb.yaml           — DynamoDB table, GSI, autoscaling
#   16c-sns.yaml                — SNS topic, subscriptions
#   17c-sqs.yaml                — SQS queue, DLQ, Lambda trigger
#   18c-waf.yaml                — WAF web ACL, managed rules
