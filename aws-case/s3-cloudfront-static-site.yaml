# =============================================================================
# CloudFormation Template: S3 + CloudFront — Static Site Hosting
# =============================================================================
#
# USE CASE:
#   Host the LEON Prompt Comparison UI (a single generated index.html) on S3,
#   fronted by CloudFront for HTTPS, caching, and edge delivery.
#   The S3 bucket is PRIVATE — only CloudFront can read it via OAC.
#
# ACCOUNT:  060725138335 (tr-central-preprod)
# REGION:   eu-west-1 (Ireland)
# ASSET ID: 207920
#
# =============================================================================
#
#   ┌─────────┐      ┌──────────────┐  OAC  ┌────────────┐
#   │  User   │─────▶│  CloudFront  │──────▶│  S3 Bucket │
#   │ Browser │ HTTPS│ Distribution │ sigv4 │ (private)  │
#   └─────────┘      └──────────────┘       └────────────┘
#
# =============================================================================
#
# KEY CONCEPTS
# =============================================================================
#
# ── What is CloudFront? ─────────────────────────────────────────────────────
#
#   CloudFront is AWS's Content Delivery Network (CDN). It caches your
#   content at 400+ edge locations worldwide so users get fast responses
#   from the server nearest to them instead of fetching from S3 every time.
#
#   In this template it:
#     - Serves the static HTML over HTTPS (S3 alone only does HTTP)
#     - Caches index.html at the edge (5-min TTL by default)
#     - Compresses responses (gzip/brotli) automatically
#     - Adds security headers (HSTS, X-Frame-Options, etc.)
#     - Handles error pages (403/404 → serve index.html for SPA routing)
#
# ── What is OAC (Origin Access Control)? ────────────────────────────────────
#
#   OAC is the mechanism that connects CloudFront to a PRIVATE S3 bucket.
#
#   The problem:
#     You want users to access your site via CloudFront, but NOT directly
#     via the S3 URL. If you make the bucket public, anyone can bypass
#     CloudFront and hit S3 directly (no caching, no HTTPS, no headers).
#
#   The solution — OAC:
#     - The S3 bucket stays fully private (Block all public access = ON)
#     - CloudFront signs every request to S3 using SigV4 (AWS standard auth)
#     - The S3 bucket policy only allows requests signed by YOUR CloudFront
#       distribution (matched by the distribution's ARN)
#     - Result: CloudFront can read → users cannot access S3 directly
#
#   How it works (the request flow):
#
#     ┌──────────────┐                              ┌─────────┐
#     │  CloudFront  │  GET /index.html             │   S3    │
#     │              │  Authorization:               │         │
#     │  (has AWS    │  AWS4-HMAC-SHA256             │ (checks │
#     │   creds via  │  Credential=AKIA.../...      │  sig &  │
#     │   OAC)       │  Signature=a3b9f1c...        │  allows)│
#     └──────────────┘──────────────────────────────▶└─────────┘
#
#     1. CloudFront takes the request details (method, URL, headers, timestamp)
#     2. Hashes them together using its AWS credentials (provided by OAC)
#     3. Attaches the resulting signature to the Authorization header
#     4. S3 receives the request, re-computes the same hash using its copy
#        of the key
#     5. Signatures match → request is authentic → access granted
#     6. No signature (someone hitting S3 URL directly) → 403 denied
#
#   Three pieces wire it together:
#     1. OAC resource        → tells CloudFront "always sign requests to S3"
#     2. Distribution config → references the OAC via OriginAccessControlId
#     3. S3 bucket policy    → "allow s3:GetObject only if request came from
#                               this specific CloudFront distribution ARN"
#
#   OAC vs OAI (legacy):
#     OAI (Origin Access Identity) was the old way. AWS deprecated it because:
#     - OAI didn't support SSE-KMS encrypted buckets
#     - OAI used a custom signing mechanism, not standard SigV4
#     - OAI couldn't be used with Lambda@Edge POST requests
#     OAC fixes all of these. Always use OAC for new distributions.
#
# ── What is SigV4 (Signature Version 4)? ───────────────────────────────────
#
#   SigV4 is AWS's standard method for authenticating ALL API requests.
#   Every AWS API call needs to prove "I'm allowed to do this" — SigV4
#   is how that proof is generated.
#
#   The signing process:
#     1. Collect request details: HTTP method, URL, headers, body, timestamp
#     2. Build a "canonical request" string from those details
#     3. Hash it using HMAC-SHA256 with your AWS secret access key
#     4. Attach the resulting signature to the Authorization header:
#        Authorization: AWS4-HMAC-SHA256 Credential=AKIA.../... Signature=a3b9f1c...
#     5. AWS receives the request, re-computes the same hash using its
#        copy of your key
#     6. If the signatures match → request is authentic and authorized
#
#   Why "Version 4"?
#     - SigV2 (deprecated) — simpler but less secure, only worked with
#       some services, no region scoping
#     - SigV4 (current)    — used by ALL AWS services, supports regions,
#       temporary credentials (STS), and is required for all new services
#
#   In this template:
#     The OAC tells CloudFront to sign every S3 request using SigV4.
#     S3 checks the signature against the bucket policy — if it came from
#     your specific CloudFront distribution, access is granted.
#     No valid signature → 403 Access Denied.
#
#   You never write SigV4 code yourself — the AWS SDK, CLI, and services
#   like CloudFront handle the signing automatically.
#
# ── What is a Cache Policy? ─────────────────────────────────────────────────
#
#   Controls what CloudFront uses as cache keys and how long it caches.
#
#   Key settings:
#     - Default TTL (300s here): how long CloudFront serves cached content
#       before re-fetching from S3. Lower = fresher content, more S3 requests.
#     - Min/Max TTL: bounds on caching. The actual TTL is determined by
#       the object's Cache-Control header, clamped between Min and Max.
#     - Gzip/Brotli: CloudFront compresses responses at the edge, reducing
#       transfer size by 60-80% for HTML/JS/CSS.
#     - Headers/Cookies/QueryStrings: what to include in the cache key.
#       "None" means all requests to the same path get the same cached response.
#
# ── What is a Response Headers Policy? ──────────────────────────────────────
#
#   Automatically adds HTTP security headers to every response, without
#   modifying your HTML or needing a server. Headers added here:
#
#     Strict-Transport-Security (HSTS):
#       Forces browsers to always use HTTPS for this domain.
#       max-age=31536000 = remember for 1 year.
#
#     X-Content-Type-Options: nosniff
#       Prevents browsers from MIME-sniffing (guessing) the content type.
#       Stops attacks where a malicious file is served as a different type.
#
#     X-XSS-Protection: 1; mode=block
#       Legacy XSS filter. Modern browsers use CSP instead, but this
#       provides a safety net for older browsers.
#
#     X-Frame-Options: DENY
#       Prevents the page from being loaded in an iframe.
#       Blocks clickjacking attacks.
#
#     Referrer-Policy: strict-origin-when-cross-origin
#       Controls how much URL info is sent in the Referer header.
#       Same-origin requests get the full URL; cross-origin gets origin only.
#
# ── What is S3 Bucket Versioning? ──────────────────────────────────────────
#
#   Keeps every version of every object ever uploaded to the bucket.
#   If you upload a new index.html, the old one is kept as a "noncurrent"
#   version. You can restore any previous version.
#
#   The LifecycleConfiguration here deletes noncurrent versions after 30
#   days to avoid unbounded storage costs.
#
# ── What is DeletionPolicy: Retain? ────────────────────────────────────────
#
#   Tells CloudFormation: "If this stack is deleted, do NOT delete the S3
#   bucket." This is a safety net — you won't accidentally lose data by
#   deleting the stack. You must manually empty and delete the bucket.
#
# =============================================================================
#
# COMPLETE DEPLOYMENT GUIDE
# =============================================================================
#
# ── PREREQUISITE: AWS Login ─────────────────────────────────────────────────
#
#   CLI:
#     cloud-tool login -u 'mgmt\m6127854' -p '<password>' \
#       --account-id '060725138335' \
#       --role 'human-role/a207920-PowerUser2'
#
#   Console:
#     1. Go to https://console.aws.amazon.com
#     2. Sign in → Switch Role
#        - Account: 060725138335
#        - Role: a207920-PowerUser2
#     3. Set region to eu-west-1 (Ireland) in the top-right dropdown
#
# ── STEP 1: Deploy the CloudFormation Stack ─────────────────────────────────
#
#   CLI:
#     aws cloudformation deploy \
#       --template-file aws-case/s3-cloudfront-static-site.yaml \
#       --stack-name a207920-leon-prompt-comparison \
#       --region eu-west-1 \
#       --profile 'mgmt\m6127854' \
#       --capabilities CAPABILITY_IAM \
#       --parameter-overrides EnvironmentName=ci
#
#   Console:
#     1. Go to CloudFormation → https://eu-west-1.console.aws.amazon.com/cloudformation
#     2. Click "Create stack" → "With new resources (standard)"
#     3. Template source: "Upload a template file"
#        → Choose file → select this YAML file → Next
#     4. Stack name: a207920-leon-prompt-comparison
#     5. Parameters:
#        - EnvironmentName: ci  (or "test" for QA)
#        - CacheTtlSeconds: 300  (leave default)
#        - DefaultRootObject: index.html  (leave default)
#     6. Click Next
#     7. Configure stack options page → scroll down → Next
#     8. Review page → scroll to bottom →
#        ✅ Check "I acknowledge that AWS CloudFormation might create IAM resources"
#     9. Click "Submit"
#     10. Wait for status: CREATE_COMPLETE (takes ~5-10 minutes,
#         mostly CloudFront distribution provisioning)
#
#   What this creates:
#     - S3 bucket (private, versioned, encrypted)
#     - CloudFront Origin Access Control (OAC)
#     - CloudFront distribution with HTTPS
#     - S3 bucket policy granting CloudFront access
#     - Cache policy (5-min default TTL)
#     - Security response headers (HSTS, X-Frame-Options, etc.)
#
# ── STEP 2: Generate the Prompt Comparison HTML ─────────────────────────────
#
#   CLI (from the skills repo root):
#     cd sphinx_leon-assistant-skills
#     python prompt-comparison/generate.py
#
#   This reads .jinja prompt files from develop/qa/uat/prod branches via git
#   and produces a single self-contained index.html at:
#     sphinx_leon-assistant-skills/prompt-comparison/index.html
#
# ── STEP 3: Get the S3 Bucket Name from Stack Outputs ──────────────────────
#
#   CLI:
#     aws cloudformation describe-stacks \
#       --stack-name a207920-leon-prompt-comparison \
#       --region eu-west-1 \
#       --profile 'mgmt\m6127854' \
#       --query "Stacks[0].Outputs" \
#       --output table
#
#   Console:
#     1. CloudFormation → Stacks → a207920-leon-prompt-comparison
#     2. Click "Outputs" tab
#     3. Note the values for:
#        - BucketName       (e.g. a207920-leon-ci-prompt-comparison)
#        - DistributionId   (e.g. E1ABC2DEF3GHIJ)
#        - CloudFrontUrl    (e.g. https://d1234abcdef.cloudfront.net)
#
# ── STEP 4: Upload index.html to S3 ────────────────────────────────────────
#
#   CLI:
#     aws s3 cp prompt-comparison/index.html \
#       s3://a207920-leon-ci-prompt-comparison/index.html \
#       --content-type "text/html; charset=utf-8" \
#       --cache-control "max-age=300" \
#       --region eu-west-1 \
#       --profile 'mgmt\m6127854'
#
#   Console:
#     1. Go to S3 → https://s3.console.aws.amazon.com/s3/buckets
#     2. Click bucket: a207920-leon-ci-prompt-comparison
#     3. Click "Upload"
#     4. Click "Add files" → select prompt-comparison/index.html
#     5. (Optional) Expand "Properties" section:
#        - Content-Type: text/html
#        - Cache-Control: max-age=300
#     6. Click "Upload"
#     7. Wait for "Upload succeeded" → Close
#
# ── STEP 5: Verify in Browser ──────────────────────────────────────────────
#
#   Open the CloudFrontUrl from Step 3 in your browser:
#     https://d1234abcdef.cloudfront.net
#
#   You should see the Prompt Comparison UI with all prompts loaded.
#
#   If you get a 403 or blank page:
#     - Wait 5-10 minutes for CloudFront distribution to fully deploy
#       (Status must be "Deployed" in CloudFront console, not "In Progress")
#     - Verify index.html exists in S3 bucket
#     - Check the S3 bucket policy was created (Permissions tab)
#
# ── STEP 6: Re-deploy After Content Changes ────────────────────────────────
#
#   When prompts change and you need to update the comparison UI:
#
#   CLI:
#     # 1. Regenerate
#     python prompt-comparison/generate.py
#
#     # 2. Re-upload
#     aws s3 cp prompt-comparison/index.html \
#       s3://a207920-leon-ci-prompt-comparison/index.html \
#       --content-type "text/html; charset=utf-8" \
#       --cache-control "max-age=300" \
#       --region eu-west-1 \
#       --profile 'mgmt\m6127854'
#
#     # 3. Invalidate CloudFront cache (so users see the new version immediately)
#     aws cloudfront create-invalidation \
#       --distribution-id <DistributionId-from-outputs> \
#       --paths "/*" \
#       --profile 'mgmt\m6127854'
#
#   Console (invalidation):
#     1. Go to CloudFront → select your distribution
#     2. Click "Invalidations" tab
#     3. Click "Create invalidation"
#     4. Object paths: /*
#     5. Click "Create invalidation"
#     6. Wait for Status: Completed (~1-2 minutes)
#
# ── STEP 7: Delete Stack (if needed) ───────────────────────────────────────
#
#   ⚠️  The S3 bucket has DeletionPolicy: Retain, so deleting the stack
#       will NOT delete the bucket (safety net). You must empty and delete
#       the bucket manually afterwards.
#
#   CLI:
#     # Delete the stack (keeps the S3 bucket)
#     aws cloudformation delete-stack \
#       --stack-name a207920-leon-prompt-comparison \
#       --region eu-west-1 \
#       --profile 'mgmt\m6127854'
#
#     # Then manually empty and delete the bucket
#     aws s3 rm s3://a207920-leon-ci-prompt-comparison --recursive \
#       --region eu-west-1 --profile 'mgmt\m6127854'
#     aws s3 rb s3://a207920-leon-ci-prompt-comparison \
#       --region eu-west-1 --profile 'mgmt\m6127854'
#
#   Console:
#     1. CloudFormation → a207920-leon-prompt-comparison → Delete
#     2. Confirm deletion → wait for DELETE_COMPLETE
#     3. S3 → a207920-leon-ci-prompt-comparison → "Empty" → confirm
#     4. Then "Delete" the bucket → confirm
#
# =============================================================================

AWSTemplateFormatVersion: '2010-09-09'
Description: >
  S3 + CloudFront for LEON Prompt Comparison static site.
  Private S3 bucket with CloudFront OAC, HTTPS, security headers.
  Account: tr-central-preprod (060725138335). Asset: 207920.

# =============================================================================
# PARAMETERS
# =============================================================================
# Console: These appear as form fields when you create the stack.
#   You can leave all defaults except EnvironmentName.

Parameters:                                  # Input variables — user provides values when creating/updating the stack

  EnvironmentName:                           # Parameter: which environment to deploy to (this name is user-defined — can be anything like Stage, Env, etc. — just match it in !Ref and !Sub)
    Type: String                             # Data type — accepts text input
    Description: >                           # > = YAML folded scalar — joins the following indented lines into one string
      Deployment environment stage.
      Console: Select from dropdown — 'ci' for dev, 'test' for QA.
    AllowedValues:                           # Restrict input to only these values — console shows a dropdown
      - ci                                   # CI = development environment
      - test                                 # Test = QA environment
    Default: ci                              # Pre-filled value if user doesn't change it

  DefaultRootObject:                         # Parameter: the default page served at "/"
    Type: String
    Description: >
      Default page served at the root URL ("/").
      Console: Leave as 'index.html' — this is the generated prompt comparison page.
    Default: index.html                      # CloudFront serves this file when user visits the root URL

  CacheTtlSeconds:                           # Parameter: how long CloudFront caches before re-fetching from S3
    Type: Number                             # Data type — accepts numeric input
    Description: >
      CloudFront default cache TTL in seconds. 300 = 5 minutes.
      Console: Leave as 300 — low TTL so new uploads appear quickly.
    Default: 300                             # 5 minutes — balance between freshness and reducing S3 requests
    MinValue: 0                              # Minimum allowed — 0 means no caching (always fetch from S3)
    MaxValue: 86400                          # Maximum allowed — 86400 seconds = 24 hours

  ApplicationAssetInsightIdTag:              # Parameter: TR asset ID used for billing/tracking
    Type: String
    Description: >
      TR asset insight ID for tagging/billing.
      Console: Leave as '207920'.
    Default: '207920'                        # Thomson Reuters asset insight ID for this project

  ResourceOwnerTag:                          # Parameter: email of the team responsible for these resources
    Type: String
    Description: >
      TR resource owner email for tagging.
      Console: Leave default or enter your team's email.
    Default: iridium@trten.onmicrosoft.com   # Iridium team email — shown in AWS resource tags for ownership

# =============================================================================
# MAPPINGS
# =============================================================================

Mappings:                                    # Static lookup tables — used by !FindInMap to convert values
  EnvironmentTypeTag:                        # Maps environment short names to TR-standard environment type labels
    ci:                                      # When EnvironmentName = "ci"...
      Name: DEVELOPMENT                      # ...the environment type tag is "DEVELOPMENT"
    test:                                    # When EnvironmentName = "test"...
      Name: QUALITY ASSURANCE                # ...the environment type tag is "QUALITY ASSURANCE"

# =============================================================================
# RESOURCES
# =============================================================================

Resources:

  # ──────────────────────────────────────────────────────────────────────────
  # 1. S3 BUCKET
  # ──────────────────────────────────────────────────────────────────────────
  # Stores the generated index.html. Private — no public access.
  #
  # Console equivalent (if creating manually):
  #   S3 → Create bucket
  #   - Name: a207920-leon-ci-prompt-comparison
  #   - Region: eu-west-1
  #   - "Block all public access" = ✅ ON (all four checkboxes checked)
  #   - Bucket Versioning: Enabled
  #   - Default encryption: SSE-S3 (AES-256)
  #   - Add tags (see below)
  #   - Create bucket
  # ──────────────────────────────────────────────────────────────────────────
  PromptComparisonBucket:
    Type: AWS::S3::Bucket                # The AWS resource type — creates an S3 bucket
    DeletionPolicy: Retain               # If the stack is deleted, KEEP the bucket (safety net — won't lose data)
    UpdateReplacePolicy: Retain          # If CloudFormation needs to replace the bucket (e.g. name change), keep the old one
    Properties:
      BucketName: !Sub 'a207920-leon-${EnvironmentName}-prompt-comparison'  # !Sub = string substitution — injects the EnvironmentName parameter value
      BucketEncryption:                  # Encrypt all objects stored in the bucket at rest
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256       # Use S3-managed AES-256 encryption (free, automatic, no KMS key needed)
      PublicAccessBlockConfiguration:    # Lock down public access — 4 independent guards, ALL set to true
        BlockPublicAcls: true            # Reject any PUT that tries to add a public ACL to an object
        BlockPublicPolicy: true          # Reject any bucket policy that would grant public access
        IgnorePublicAcls: true           # Even if a public ACL exists, S3 ignores it
        RestrictPublicBuckets: true      # Restricts access to the bucket to only AWS service principals and authorized users
      VersioningConfiguration:
        Status: Enabled                  # Keep every version of every uploaded object — lets you rollback to a previous index.html
      LifecycleConfiguration:            # Automatic cleanup rules to manage storage costs
        Rules:
          - Id: DeleteOldVersions        # Rule name (for identification in console)
            Status: Enabled              # Rule is active
            NoncurrentVersionExpiration:
              NoncurrentDays: 30         # Delete old versions after 30 days — keeps costs down while allowing rollback window
      Tags:                              # Metadata tags for billing, ownership, and organization
        - Key: Name                      # Human-readable name (shows in S3 console)
          Value: !Sub 'a207920-leon-${EnvironmentName}-prompt-comparison'
        - Key: tr:application-asset-insight-id  # TR billing/asset tracking ID
          Value: !Ref ApplicationAssetInsightIdTag                # !Ref = reference — pulls the parameter value
        - Key: tr:resource-owner         # Team email responsible for this resource
          Value: !Ref ResourceOwnerTag
        - Key: tr:environment-type       # DEVELOPMENT or QUALITY ASSURANCE
          Value: !FindInMap [EnvironmentTypeTag, !Ref EnvironmentName, Name]  # !FindInMap = lookup from the Mappings section
        - Key: tr:environment-name       # Raw environment name (ci or test)
          Value: !Ref EnvironmentName
        - Key: tr:project-name           # Project name for grouping resources
          Value: sphinx

  # ──────────────────────────────────────────────────────────────────────────
  # 2. S3 BUCKET POLICY
  # ──────────────────────────────────────────────────────────────────────────
  # Grants CloudFront OAC permission to read objects from the bucket.
  # Without this, CloudFront gets 403 from S3.
  #
  # Console equivalent (if creating manually):
  #   S3 → your bucket → Permissions tab → Bucket policy → Edit
  #   Paste the JSON policy below (replacing the ARN placeholders):
  #
  #   {
  #     "Version": "2012-10-17",
  #     "Statement": [
  #       {
  #         "Sid": "AllowCloudFrontOAC",
  #         "Effect": "Allow",
  #         "Principal": {
  #           "Service": "cloudfront.amazonaws.com"
  #         },
  #         "Action": "s3:GetObject",
  #         "Resource": "arn:aws:s3:::a207920-leon-<ENV>-prompt-comparison/*",
  #         "Condition": {
  #           "StringEquals": {
  #             "AWS:SourceArn": "arn:aws:cloudfront::060725138335:distribution/<DISTRIBUTION_ID>"
  #           }
  #         }
  #       }
  #     ]
  #   }
  #
  #   HOW TO GET THE VALUES FOR THIS POLICY (when creating manually):
  #
  #   ── Getting the S3 Bucket ARN ──────────────────────────────────────────
  #
  #     Option A — From the S3 Console:
  #       1. Go to S3 → https://s3.console.aws.amazon.com/s3/buckets
  #       2. Click your bucket name (e.g. a207920-leon-ci-prompt-comparison)
  #       3. Click "Properties" tab
  #       4. At the very top, you see:
  #          Amazon Resource Name (ARN): arn:aws:s3:::a207920-leon-ci-prompt-comparison
  #       5. Click the copy icon next to it
  #       6. In the policy, use this as Resource with /* appended:
  #          "Resource": "arn:aws:s3:::a207920-leon-ci-prompt-comparison/*"
  #
  #     Option B — You already know it (it's always this pattern):
  #       arn:aws:s3:::<bucket-name>/*
  #       e.g. arn:aws:s3:::a207920-leon-ci-prompt-comparison/*
  #
  #   ── Getting the CloudFront Distribution ARN ────────────────────────────
  #
  #     Option A — From the CloudFront Console:
  #       1. Go to CloudFront → https://console.aws.amazon.com/cloudfront
  #       2. Click your distribution ID (e.g. E1ABC2DEF3GHIJ)
  #       3. On the "General" tab, find:
  #          ARN: arn:aws:cloudfront::060725138335:distribution/E1ABC2DEF3GHIJ
  #       4. Click the copy icon
  #       5. In the policy, use this as the Condition value:
  #          "AWS:SourceArn": "arn:aws:cloudfront::060725138335:distribution/E1ABC2DEF3GHIJ"
  #
  #     Option B — Build it yourself:
  #       arn:aws:cloudfront::<ACCOUNT_ID>:distribution/<DISTRIBUTION_ID>
  #       - Account ID: shown in top-right corner of AWS Console (e.g. 060725138335)
  #       - Distribution ID: shown in CloudFront → Distributions list (e.g. E1ABC2DEF3GHIJ)
  #
  #   ── Easiest Method: Use CloudFront's Auto-Generated Policy ─────────────
  #
  #     When you create a CloudFront distribution with OAC via the console,
  #     AWS automatically generates the correct bucket policy for you:
  #
  #       1. Create the CloudFront distribution (see Section 6 below)
  #          - Set origin to your S3 bucket
  #          - Set "Origin access" to "Origin access control settings"
  #          - Select or create an OAC
  #       2. After creation, a yellow banner appears at the top:
  #          ┌────────────────────────────────────────────────────────────┐
  #          │ ⚠️ The S3 bucket policy needs to be updated.              │
  #          │                                                           │
  #          │ S3 bucket access — Needs to update the S3 bucket policy   │
  #          │ to allow CloudFront service principal to access the S3    │
  #          │ bucket.                                                   │
  #          │                                                           │
  #          │                              [Copy policy]                │
  #          └────────────────────────────────────────────────────────────┘
  #       3. Click "Copy policy" — this copies the COMPLETE JSON policy
  #          with all ARNs already filled in
  #       4. Go to S3 → your bucket → "Permissions" tab
  #       5. Scroll to "Bucket policy" → click "Edit"
  #       6. Paste the copied policy → click "Save changes"
  #       7. Done — CloudFront can now read from S3
  #
  #   ── Complete Manual Steps (no CloudFormation) ──────────────────────────
  #
  #     If you're doing everything manually without CloudFormation:
  #
  #     Step 1: Create S3 Bucket (if not already created)
  #     Step 2: Create CloudFront Distribution with OAC
  #     Step 3: Copy the auto-generated policy from CloudFront banner
  #             OR build it manually using the ARNs above
  #     Step 4: Paste into S3 → Bucket → Permissions → Bucket policy → Edit
  #     Step 5: Save — verify CloudFront can now serve your content
  #
  #   ⚠️  NOTE: With CloudFormation (this template), all of this is automatic.
  #       The BucketPolicy resource below wires the ARNs using !Sub and !Ref,
  #       so you never need to copy/paste anything manually.
  # ──────────────────────────────────────────────────────────────────────────
  PromptComparisonBucketPolicy:
    Type: AWS::S3::BucketPolicy             # AWS resource type — attaches an access policy to an S3 bucket
    Properties:
      Bucket: !Ref PromptComparisonBucket    # !Ref = reference — points to the bucket resource defined above
      PolicyDocument:                        # The IAM policy document (JSON-like structure in YAML)
        Version: '2012-10-17'                # IAM policy language version (always this date — it's a format version, not today's date)
        Statement:                           # Array of permission rules
          - Sid: AllowCloudFrontOAC          # Statement ID — human-readable label for this rule
            Effect: Allow                    # Allow (grant access) — the alternative is Deny
            Principal:                       # WHO is allowed — in this case, the CloudFront service itself
              Service: cloudfront.amazonaws.com  # AWS service principal — only CloudFront can use this policy
            Action: s3:GetObject             # WHAT action is allowed — reading objects from the bucket
            Resource: !Sub '${PromptComparisonBucket.Arn}/*'  # WHICH objects — all objects (*) in this bucket's ARN
            Condition:                       # Extra guard — even CloudFront must prove it's OUR distribution
              StringEquals:                  # Condition type — exact string match required
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${PromptComparisonDistribution}'  # Only requests from THIS specific CloudFront distribution are allowed

  # ──────────────────────────────────────────────────────────────────────────
  # 3. CLOUDFRONT ORIGIN ACCESS CONTROL (OAC)
  # ──────────────────────────────────────────────────────────────────────────
  # OAC replaces the legacy Origin Access Identity (OAI).
  # It lets CloudFront sign S3 requests using SigV4 without making
  # the bucket public.
  #
  # Console equivalent (if creating manually):
  #   CloudFront → left sidebar → "Origin access"
  #   → "Control settings" tab → "Create control setting"
  #   - Name: a207920-leon-ci-prompt-comparison-oac
  #   - Description: OAC for prompt comparison S3 bucket
  #   - Signing behavior: Sign requests (recommended)
  #   - Origin type: S3
  #   → Create
  # ──────────────────────────────────────────────────────────────────────────
  PromptComparisonOAC:
    Type: AWS::CloudFront::OriginAccessControl  # AWS resource type — creates an Origin Access Control for CloudFront
    Properties:
      OriginAccessControlConfig:             # Configuration block for the OAC settings
        Name: !Sub 'a207920-leon-${EnvironmentName}-prompt-comparison-oac'  # Unique name for this OAC — !Sub injects the environment
        Description: !Sub 'OAC for LEON prompt comparison S3 bucket (${EnvironmentName})'  # Human-readable description shown in CloudFront console
        OriginAccessControlOriginType: s3    # Origin type — tells CloudFront this OAC is for an S3 bucket (vs. MediaStore, Lambda URL, etc.)
        SigningBehavior: always              # Always sign requests to S3 — even if the bucket allows public access (defense in depth)
        SigningProtocol: sigv4               # Use AWS Signature Version 4 — the standard AWS request authentication method

  # ──────────────────────────────────────────────────────────────────────────
  # 4. CLOUDFRONT CACHE POLICY
  # ──────────────────────────────────────────────────────────────────────────
  # Controls how long CloudFront caches the HTML before re-fetching from S3.
  # Default TTL = 300s (5 min) — low so new uploads appear quickly.
  #
  # Console equivalent (if creating manually):
  #   CloudFront → Policies (left sidebar) → Cache tab
  #   → "Create cache policy"
  #   - Name: a207920-leon-ci-prompt-comparison-cache
  #   - Minimum TTL: 0
  #   - Maximum TTL: 86400
  #   - Default TTL: 300
  #   - Gzip: ✅  Brotli: ✅
  #   - Headers: None
  #   - Cookies: None
  #   - Query strings: None
  #   → Create
  # ──────────────────────────────────────────────────────────────────────────
  PromptComparisonCachePolicy:
    Type: AWS::CloudFront::CachePolicy      # AWS resource type — defines how CloudFront caches content
    Properties:
      CachePolicyConfig:                     # Configuration block for the cache policy settings
        Name: !Sub 'a207920-leon-${EnvironmentName}-prompt-comparison-cache'  # Unique name — shown in CloudFront Policies console
        Comment: !Sub 'Short-TTL cache for prompt comparison (${EnvironmentName})'  # Description shown in the console
        DefaultTTL: !Ref CacheTtlSeconds     # Default cache duration (300s = 5 min) — !Ref pulls from the Parameters section
        MinTTL: 0                            # Minimum TTL — allows Cache-Control: no-cache to bypass cache entirely
        MaxTTL: 86400                        # Maximum TTL (24 hours) — caps how long CloudFront can cache even if origin says longer
        ParametersInCacheKeyAndForwardedToOrigin:  # Controls what makes each cached response unique (the "cache key")
          EnableAcceptEncodingGzip: true      # Serve gzip-compressed version if browser supports it — reduces transfer size ~60-80%
          EnableAcceptEncodingBrotli: true    # Serve brotli-compressed version if supported — even better compression than gzip
          HeadersConfig:                     # Which HTTP headers to include in the cache key
            HeaderBehavior: none             # None — all requests to the same path get the same cached response regardless of headers
          CookiesConfig:                     # Which cookies to include in the cache key
            CookieBehavior: none             # None — cookies are ignored for caching (static site has no user-specific content)
          QueryStringsConfig:                # Which query string parameters to include in the cache key
            QueryStringBehavior: none        # None — ?foo=bar and ?foo=baz both get the same cached response

  # ──────────────────────────────────────────────────────────────────────────
  # 5. CLOUDFRONT RESPONSE HEADERS POLICY
  # ──────────────────────────────────────────────────────────────────────────
  # Adds security headers to every response served by CloudFront.
  #
  # Console equivalent (if creating manually):
  #   CloudFront → Policies → Response headers tab
  #   → "Create response headers policy"
  #   - Name: a207920-leon-ci-prompt-comparison-headers
  #   - Security headers section:
  #     - Strict-Transport-Security: ✅ max-age=31536000, includeSubDomains, preload
  #     - X-Content-Type-Options: ✅ nosniff
  #     - X-XSS-Protection: ✅ 1; mode=block
  #     - X-Frame-Options: ✅ DENY
  #     - Referrer-Policy: ✅ strict-origin-when-cross-origin
  #   → Create
  # ──────────────────────────────────────────────────────────────────────────
  PromptComparisonResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy  # AWS resource type — adds HTTP headers to every CloudFront response
    Properties:
      ResponseHeadersPolicyConfig:           # Configuration block for the response headers policy
        Name: !Sub 'a207920-leon-${EnvironmentName}-prompt-comparison-headers'  # Unique name — shown in CloudFront Policies console
        Comment: Security headers for prompt comparison  # Description shown in the console
        SecurityHeadersConfig:               # Block of security-related HTTP headers to inject
          StrictTransportSecurity:            # HSTS — forces browsers to always use HTTPS for this domain
            AccessControlMaxAgeSec: 31536000  # Browser remembers "always use HTTPS" for 1 year (31536000 seconds)
            IncludeSubdomains: true           # Apply HSTS to all subdomains too (e.g. api.example.com)
            Override: true                   # Override any HSTS header the origin (S3) might set — CloudFront's wins
            Preload: true                    # Eligible for browser HSTS preload lists — HTTPS enforced before first visit
          ContentTypeOptions:                # X-Content-Type-Options header
            Override: true                   # Sets "nosniff" — prevents browser from guessing (MIME-sniffing) content type
          XSSProtection:                     # X-XSS-Protection header — legacy browser XSS filter
            ModeBlock: true                  # mode=block — if XSS detected, block the entire page (don't try to sanitize)
            Override: true                   # Override any X-XSS-Protection header from the origin
            Protection: true                 # Enable the XSS filter (sets the header value to "1")
          FrameOptions:                      # X-Frame-Options header — controls iframe embedding
            FrameOption: DENY                # DENY — page cannot be loaded in any iframe (prevents clickjacking attacks)
            Override: true                   # Override any X-Frame-Options header from the origin
          ReferrerPolicy:                    # Referrer-Policy header — controls what URL info is sent in the Referer header
            ReferrerPolicy: strict-origin-when-cross-origin  # Same-origin gets full URL; cross-origin gets origin only (no path)
            Override: true                   # Override any Referrer-Policy header from the origin

  # ──────────────────────────────────────────────────────────────────────────
  # 6. CLOUDFRONT DISTRIBUTION
  # ──────────────────────────────────────────────────────────────────────────
  # The CDN distribution that serves the static site to users.
  # Connects to S3 via OAC, uses the cache policy and headers policy above.
  #
  # Console equivalent (if creating manually):
  #   CloudFront → "Create distribution"
  #
  #   Origin settings:
  #   - Origin domain: a207920-leon-ci-prompt-comparison.s3.eu-west-1.amazonaws.com
  #     (select from dropdown — pick the S3 bucket, NOT the website endpoint)
  #   - Origin access: "Origin access control settings (recommended)"
  #     → Select the OAC created above
  #   - Leave "Add custom header" empty
  #
  #   Default cache behavior:
  #   - Viewer protocol policy: "Redirect HTTP to HTTPS"
  #   - Allowed HTTP methods: GET, HEAD, OPTIONS
  #   - Cache policy: select "a207920-leon-ci-prompt-comparison-cache" (custom)
  #     OR use "CachingOptimized" (managed, 24hr TTL)
  #   - Response headers policy: select "a207920-leon-ci-prompt-comparison-headers"
  #   - Compress objects automatically: Yes
  #
  #   Settings:
  #   - Price class: "Use only North America and Europe" (PriceClass_100)
  #   - Default root object: index.html
  #   - Description: LEON Prompt Comparison UI (ci)
  #   - HTTP version: HTTP/2 and HTTP/3
  #
  #   Tags: (same as bucket)
  #
  #   → Create distribution
  #
  #   ⚠️ IMPORTANT: After creation, AWS shows a yellow banner:
  #      "The S3 bucket policy needs to be updated"
  #      Click "Copy policy" → go to S3 bucket → Permissions → Bucket policy
  #      → Edit → paste → Save changes.
  #      (CloudFormation handles this automatically via the BucketPolicy resource)
  #
  #   Wait ~5-10 minutes for Status to change from "In Progress" to "Deployed"
  # ──────────────────────────────────────────────────────────────────────────
  PromptComparisonDistribution:
    Type: AWS::CloudFront::Distribution      # AWS resource type — creates a CloudFront CDN distribution
    Properties:
      DistributionConfig:                    # Main configuration block for the distribution
        Enabled: true                        # Distribution is active and serving traffic (false = disabled, returns 403)
        Comment: !Sub 'LEON Prompt Comparison UI (${EnvironmentName})'  # Description shown in CloudFront console
        DefaultRootObject: !Ref DefaultRootObject  # Page served when user hits "/" — pulls "index.html" from Parameters
        HttpVersion: http2and3               # Support HTTP/2 (multiplexed) and HTTP/3 (QUIC/UDP) — fastest protocols
        PriceClass: PriceClass_100           # Edge locations in North America + Europe only — cheapest tier, sufficient for internal tool
        Origins:                             # List of content sources (where CloudFront fetches from)
          - Id: S3Origin                     # Unique ID for this origin — referenced by cache behaviors below
            DomainName: !GetAtt PromptComparisonBucket.RegionalDomainName  # !GetAtt = get attribute — S3 bucket's regional URL (e.g. bucket.s3.eu-west-1.amazonaws.com)
            OriginAccessControlId: !Ref PromptComparisonOAC  # Attach the OAC — tells CloudFront to sign requests to S3 with SigV4
            S3OriginConfig:                  # S3-specific origin configuration
              OriginAccessIdentity: ''       # Empty string — required when using OAC (OAI is legacy; we use OAC instead)
        DefaultCacheBehavior:                # How CloudFront handles requests that don't match any specific path pattern
          TargetOriginId: S3Origin           # Route all requests to the S3Origin defined above
          ViewerProtocolPolicy: redirect-to-https  # If user visits HTTP, automatically redirect to HTTPS (secure by default)
          AllowedMethods:                    # HTTP methods CloudFront will accept from viewers
            - GET                            # Read content
            - HEAD                           # Read headers only (used by browsers for cache validation)
            - OPTIONS                        # CORS preflight requests
          CachedMethods:                     # Which of the allowed methods CloudFront will cache responses for
            - GET                            # Cache GET responses
            - HEAD                           # Cache HEAD responses
          Compress: true                     # CloudFront compresses responses at the edge (gzip/brotli) if viewer supports it
          CachePolicyId: !Ref PromptComparisonCachePolicy  # Use our custom cache policy (5-min TTL, gzip/brotli)
          ResponseHeadersPolicyId: !Ref PromptComparisonResponseHeadersPolicy  # Use our security headers policy (HSTS, X-Frame-Options, etc.)
        CustomErrorResponses:                # Custom handling when S3 returns error codes
          # SPA-style fallback: if S3 returns 403/404 (object not found),
          # serve index.html with 200 so client-side hash routing works.
          #
          # Console: CloudFront → distribution → "Error pages" tab
          #   → "Create custom error response"
          #   - HTTP error code: 403 → Response page path: /index.html
          #     → HTTP response code: 200 → Error caching min TTL: 10
          #   - Repeat for 404
          - ErrorCode: 403                   # When S3 returns 403 Forbidden (e.g. object doesn't exist in private bucket)
            ResponseCode: 200                # CloudFront returns 200 OK to the browser instead
            ResponsePagePath: /index.html    # Serve this page — lets client-side JavaScript handle routing
            ErrorCachingMinTTL: 10           # Cache this error response for only 10 seconds (so new uploads appear quickly)
          - ErrorCode: 404                   # When S3 returns 404 Not Found
            ResponseCode: 200                # Return 200 OK instead
            ResponsePagePath: /index.html    # Serve index.html — same SPA fallback pattern
            ErrorCachingMinTTL: 10           # Cache for 10 seconds only
      Tags:                                  # Metadata tags for billing, ownership, and organization
        - Key: Name                          # Human-readable name shown in CloudFront console
          Value: !Sub 'a207920-leon-${EnvironmentName}-prompt-comparison-cf'
        - Key: tr:application-asset-insight-id  # TR billing/asset tracking ID
          Value: !Ref ApplicationAssetInsightIdTag
        - Key: tr:resource-owner             # Team email responsible for this resource
          Value: !Ref ResourceOwnerTag
        - Key: tr:environment-type           # DEVELOPMENT or QUALITY ASSURANCE — looked up from Mappings
          Value: !FindInMap [EnvironmentTypeTag, !Ref EnvironmentName, Name]
        - Key: tr:environment-name           # Raw environment name (ci or test)
          Value: !Ref EnvironmentName
        - Key: tr:project-name               # Project name for grouping resources
          Value: sphinx

# =============================================================================
# OUTPUTS
# =============================================================================
# After stack creation, these values appear in the "Outputs" tab.
#
# Console: CloudFormation → your stack → "Outputs" tab
# CLI:     aws cloudformation describe-stacks --stack-name a207920-leon-prompt-comparison \
#            --query "Stacks[0].Outputs" --output table

Outputs:                                   # Values exposed after stack creation — visible in console "Outputs" tab and via CLI

  BucketName:                                # Output: the S3 bucket name for uploading content
    Description: >
      S3 bucket name. Upload index.html here after generating:
        aws s3 cp prompt-comparison/index.html s3://<BucketName>/index.html \
          --content-type "text/html; charset=utf-8" --cache-control "max-age=300" \
          --region eu-west-1 --profile 'mgmt\m6127854'
      Console: S3 → this bucket → Upload → select index.html → Upload
    Value: !Ref PromptComparisonBucket       # !Ref on an S3 bucket returns the bucket NAME (e.g. a207920-leon-ci-prompt-comparison)
    Export:                                  # Makes this value importable by other CloudFormation stacks
      Name: !Sub '${AWS::StackName}-bucket-name'  # Export name — other stacks can use !ImportValue to reference it

  BucketArn:                                 # Output: the S3 bucket ARN for IAM policies
    Description: >
      S3 bucket ARN. Use in IAM policies if setting up CI/CD auto-deploy.
    Value: !GetAtt PromptComparisonBucket.Arn  # !GetAtt = get attribute — returns the bucket's ARN (e.g. arn:aws:s3:::a207920-leon-ci-prompt-comparison)
    Export:
      Name: !Sub '${AWS::StackName}-bucket-arn'  # Cross-stack export name

  DistributionId:                            # Output: CloudFront distribution ID for cache invalidation
    Description: >
      CloudFront distribution ID. Use to invalidate cache after re-uploading:
        aws cloudfront create-invalidation \
          --distribution-id <DistributionId> --paths "/*" \
          --profile 'mgmt\m6127854'
      Console: CloudFront → distribution → Invalidations → Create invalidation
        → Path: /* → Create
    Value: !Ref PromptComparisonDistribution  # !Ref on a CloudFront distribution returns the distribution ID (e.g. E1ABC2DEF3GHIJ)
    Export:
      Name: !Sub '${AWS::StackName}-distribution-id'  # Cross-stack export name

  DistributionDomainName:                    # Output: the auto-assigned CloudFront domain
    Description: >
      CloudFront domain name (e.g. d1234abcdef.cloudfront.net).
      This is the auto-assigned domain. To use a custom domain, add an
      Alias + ACM certificate to the distribution config.
    Value: !GetAtt PromptComparisonDistribution.DomainName  # !GetAtt returns the domain name attribute (e.g. d1234abcdef.cloudfront.net)
    Export:
      Name: !Sub '${AWS::StackName}-distribution-domain'  # Cross-stack export name

  CloudFrontUrl:                             # Output: the full HTTPS URL to access the site
    Description: >
      Full HTTPS URL — open this in a browser to access the prompt comparison UI.
      Console: CloudFront → your distribution → copy "Distribution domain name"
    Value: !Sub 'https://${PromptComparisonDistribution.DomainName}'  # !Sub builds the full URL by prepending https:// to the domain
    Export:
      Name: !Sub '${AWS::StackName}-url'     # Cross-stack export name — other stacks can import this URL
